<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 2.2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 8px;
            font-size: 1rem;
        }

        input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            cursor: pointer;
        }

        input[type="date"]:focus {
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.12);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #result-section {
            margin-top: 35px;
            display: none;
        }

        .result-title {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        #fortune-text {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 0.98rem;
            min-height: 50px;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stars {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 5px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stars">✨ ⭐ ✨</div>
        <h1>오늘의 운세</h1>
        <p class="subtitle">생년월일을 입력하면 AI가 오늘의 운세를 알려드립니다</p>

        <form id="fortune-form">
            <div class="form-group">
                <label for="birth_date">생년월일</label>
                <input type="date" id="birth_date" name="birth_date" required
                       max="2010-12-31" min="1900-01-01">
            </div>
            <button type="submit" id="submit-btn">🔮 운세 보기</button>
        </form>

        <div id="result-section">
            <div class="result-title">📜 나의 오늘 운세</div>
            <div id="fortune-text">
                <div class="loading" id="loading-indicator">
                    <div class="spinner"></div>
                    <span>운세를 분석하고 있습니다...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('fortune-form');
        const submitBtn = document.getElementById('submit-btn');
        const resultSection = document.getElementById('result-section');
        const fortuneText = document.getElementById('fortune-text');
        const loadingIndicator = document.getElementById('loading-indicator');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const birthDate = document.getElementById('birth_date').value;
            if (!birthDate) return;

            submitBtn.disabled = true;
            submitBtn.textContent = '🔮 분석 중...';
            resultSection.style.display = 'block';
            fortuneText.innerHTML = '';
            fortuneText.appendChild(loadingIndicator);
            loadingIndicator.style.display = 'flex';

            let resultText = '';
            let loadingRemoved = false;

            const formData = new FormData();
            formData.append('birth_date', birthDate);

            try {
                const response = await fetch('/fortune', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    throw new Error('서버 오류가 발생했습니다.');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;

                            if (!loadingRemoved) {
                                loadingIndicator.style.display = 'none';
                                loadingRemoved = true;
                            }

                            resultText += data;
                            fortuneText.textContent = resultText;
                        }
                    }
                }
            } catch (error) {
                fortuneText.textContent = '오류가 발생했습니다: ' + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🔮 운세 보기';
            }
        });
    </script>
</body>
</html>
